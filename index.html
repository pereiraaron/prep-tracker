<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" /></noscript>
    <link rel="canonical" href="https://preptracker.app" />

    <title>PrepTracker — Interview Prep Tracker</title>
    <meta name="description" content="Track your coding interview preparation. Organize questions by category, monitor progress with charts, and stay consistent with PrepTracker." />
    <meta name="keywords" content="interview prep, coding questions, leetcode tracker, DSA practice, interview preparation, system design, behavioral" />
    <meta name="author" content="PrepTracker" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#4f5bd5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1d2e" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- Open Graph -->
    <meta property="og:title" content="PrepTracker — Interview Prep Tracker" />
    <meta property="og:description" content="Track your coding interview preparation. Organize questions, monitor progress, and stay consistent." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://preptracker.app" />
    <meta property="og:site_name" content="PrepTracker" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PrepTracker — Interview Prep Tracker" />
    <meta name="twitter:description" content="Track your coding interview preparation. Organize questions, monitor progress, and stay consistent." />

    <!-- Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PrepTracker" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PrepTracker",
        "description": "Track your coding interview preparation. Organize questions by category, monitor progress with charts, and stay consistent.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web"
      }
    </script>
  </head>

  <body>
    <div id="root">
      <style>
        #app-loader{display:flex;align-items:center;justify-content:center;height:100vh;background:#0f1117}
        #app-loader svg{animation:spin 1s linear infinite;width:24px;height:24px;color:#6366f1}
        @keyframes spin{to{transform:rotate(360deg)}}
      </style>
      <div id="app-loader">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 12a8 8 0 018-8m0 16a8 8 0 008-8" /></svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
